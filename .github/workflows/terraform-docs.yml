name: Auto-Generate Terraform Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**.tf'
      - '.terraform-docs.yml'
  pull_request:
    paths:
      - 'terraform/**.tf'
      - '.terraform-docs.yml'
  workflow_dispatch:

concurrency:
  group: terraform-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    name: Discover Terraform modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set
        # Build a matrix of every directory containing *.tf under terraform/.
        # Keeps the workflow correct as modules are added or removed.
        run: |
          set -euo pipefail
          dirs=$(find terraform -type f -name '*.tf' -printf '%h\n' | sort -u)
          json=$(printf '%s\n' "$dirs" | jq -R . | jq -s '{include: map({path: ., name: (. | gsub("/"; "_"))})}')
          echo "matrix=$(echo "$json" | jq -c .)" >> "$GITHUB_OUTPUT"

  docs:
    name: Generate Documentation
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Render terraform-docs for ${{ matrix.path }}
        uses: terraform-docs/gh-actions@v1.3.0
        with:
          working-dir: ${{ matrix.path }}
          output-file: README.md
          output-method: inject
          git-push: "false"

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.name }}
          path: ${{ matrix.path }}/README.md
          if-no-files-found: ignore
          retention-days: 1

  commit-docs:
    name: Commit Documentation Changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docs
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download all documentation artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: docs-*
          path: _docs

      - name: Move documentation to correct locations
        # Each artifact name encodes the original path with '/' replaced by '_'.
        # Reverse that to drop README.md back into each module directory.
        run: |
          set -euo pipefail
          shopt -s nullglob
          for d in _docs/docs-*; do
            name=${d#_docs/docs-}
            target_dir=${name//_/\/}
            if [ -f "$d/README.md" ] && [ -d "$target_dir" ]; then
              mv "$d/README.md" "$target_dir/README.md"
            fi
          done

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No documentation changes detected"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Documentation changes detected"
          fi

      - name: Commit and push changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: auto-generate terraform documentation [skip ci]"
          git push
