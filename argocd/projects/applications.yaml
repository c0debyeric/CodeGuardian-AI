apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: LLM Gateway application workloads
  
  sourceRepos:
    - 'https://github.com/*'
    - '*'
    # Bitnami chart repo for in-cluster Redis
    - 'registry-1.docker.io/bitnamicharts'
  
  destinations:
    - namespace: llm-gateway
      server: https://kubernetes.default.svc
    - namespace: llm-gateway-staging
      server: https://kubernetes.default.svc
    # Redis ServiceMonitor lives in monitoring namespace
    - namespace: monitoring
      server: https://kubernetes.default.svc
  
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: networking.k8s.io
      kind: '*'
  
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  
  orphanedResources:
    warn: true
