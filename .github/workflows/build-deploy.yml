name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: codeguardian-dev

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            context: ./app/backend
            ecr_repo: codeguardian/backend
          - component: frontend
            context: ./app/frontend
            ecr_repo: codeguardian/frontend
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ matrix.ecr_repo }}:latest \
            ${{ matrix.context }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:${{ steps.image-tag.outputs.tag }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          docker push $ECR_REGISTRY/${{ matrix.ecr_repo }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ matrix.ecr_repo }}:latest

      - name: Deployment summary
        run: |
          echo "## Build Summary - ${{ matrix.component }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ matrix.ecr_repo }}:${{ steps.image-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build and push successful" >> $GITHUB_STEP_SUMMARY
