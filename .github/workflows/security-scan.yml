name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# SARIF uploads require security-events:write; the rest of the workflow is read-only.
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-scan:
    name: SAST Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        # The old returntocorp/semgrep-action repository was archived; use the
        # current semgrep/semgrep-action.
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python
            p/docker

  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    # Snyk requires a paid token. If SNYK_TOKEN is not configured the job is
    # a no-op rather than a hard failure on every push.
    if: ${{ vars.ENABLE_SNYK == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=app/backend/pyproject.toml

  iac-scan:
    name: IaC Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        continue-on-error: true
        with:
          directory: terraform/
          framework: terraform
          # Audit-mode: surface findings in the Security tab without blocking
          # every commit. The terraform-aws-modules upstream charts have ~60
          # opinion-level warnings that we accept.
          soft_fail: true
          download_external_modules: true
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  container-scan:
    name: Container Image Scanning
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: ./app/backend
          - component: admin-ui
            context: ./app/admin-ui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t codeguardian-${{ matrix.component }}:${{ github.sha }} ${{ matrix.context }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: codeguardian-${{ matrix.component }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-${{ matrix.component }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.component)) != ''
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}

  security-report:
    name: Generate Security Report
    needs: [secret-scan, sast-scan, dependency-scan, iac-scan, container-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Security Scan Summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Detection: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SAST Analysis: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Scanning: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ IaC Scanning: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container Scanning: Completed" >> $GITHUB_STEP_SUMMARY
