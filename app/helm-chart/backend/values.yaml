replicaCount: 2

image:
  repository: "810749429738.dkr.ecr.us-east-1.amazonaws.com/codeguardian/backend"
  tag: "latest"
  pullPolicy: Always

serviceAccount:
  create: true
  # IAM Role for Bedrock access is bound via IRSA annotations in the SA template
  name: llm-gateway-backend

service:
  type: ClusterIP
  port: 8000

env:
  # --- Core ---
  APP_NAME: "LLM Gateway"
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_LEVEL: "INFO"
  # --- Providers ---
  BEDROCK_ENABLED: "true"
  OPENAI_ENABLED: "false"
  AWS_REGION: "us-east-1"
  DEFAULT_MODEL: "auto"
  FALLBACK_ENABLED: "true"
  # --- Auth + limits ---
  AUTH_ENABLED: "true"
  # --- Guardrails + cache ---
  GUARDRAILS_ENABLED: "true"
  GUARDRAILS_REDACT_PII: "true"
  SEMANTIC_CACHE_ENABLED: "true"
  SEMANTIC_CACHE_MODE: "exact"
  SEMANTIC_CACHE_THRESHOLD: "0.85"
  SEMANTIC_CACHE_TTL_SECONDS: "3600"
  # --- Backing services (in-cluster Redis from Bitnami chart) ---
  REDIS_URL: "redis://redis-master.llm-gateway.svc.cluster.local:6379/0"
  # --- Observability ---
  OTEL_SERVICE_NAME: "llm-gateway"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-collector.monitoring:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"

# Postgres credentials for usage-tracking DB. Pulled via ExternalSecret
# from AWS Secrets Manager. The deployment composes DATABASE_URL at startup.
externalSecret:
  enabled: true
  secretStore:
    name: aws-secrets-manager
    kind: SecretStore
  remoteSecretName: "llm-gateway/db-credentials"
  targetSecretName: "db-credentials"

# Admin API key (for tenant management endpoints). Pulled from a separate
# Secrets Manager entry so it can be rotated independently of DB creds.
adminSecret:
  enabled: true
  remoteSecretName: "llm-gateway/admin-api-key"
  targetSecretName: "llm-gateway-admin"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 30s

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3

nodeSelector: {}
tolerations: []
affinity: {}
