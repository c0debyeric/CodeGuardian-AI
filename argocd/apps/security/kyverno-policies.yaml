# Kyverno Policies - Security best practices
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Deploy after Kyverno
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  
  source:
    repoURL: https://kyverno.github.io/kyverno
    targetRevision: 3.3.4
    chart: kyverno-policies
    helm:
      valuesObject:
        # Pod Security Standards
        podSecurityStandard: restricted
        
        # Validation failure action (audit vs enforce)
        validationFailureAction: Audit  # Start with Audit, move to Enforce later
        
        # Background scanning
        background: true
        
        # Include specific policies
        includeRestrictedPolicies: true
        includeBestPractices: true
  
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
