apiVersion: v1
kind: ConfigMap
metadata:
  name: codeguardian-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  codeguardian-app.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "rate(http_requests_total{namespace=\"codeguardian\"}[5m])",
              "legendFormat": "{{method}} {{path}}"
            }
          ]
        },
        {
          "title": "Request Latency (p50/p95/p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(http_request_duration_seconds_bucket{namespace=\"codeguardian\"}[5m]))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{namespace=\"codeguardian\"}[5m]))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{namespace=\"codeguardian\"}[5m]))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "title": "Error Rate",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"codeguardian\", status=~\"5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"codeguardian\"}[5m])) * 100",
              "legendFormat": "Error %"
            }
          ]
        },
        {
          "title": "Active Pods",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"codeguardian\", phase=\"Running\"})",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "title": "Bedrock Analysis Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(bedrock_request_duration_seconds_bucket{namespace=\"codeguardian\"}[5m]))",
              "legendFormat": "p95 Bedrock latency"
            }
          ]
        },
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"codeguardian\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"codeguardian\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["codeguardian"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "CodeGuardian AI - Application",
      "uid": "codeguardian-app"
    }
